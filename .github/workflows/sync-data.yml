name: Data Sync Hourly Predictions to Repo
run-name: Syncing hourly predictions for ${{ github.ref_name }} by @${{ github.actor }}

on:
  schedule:
    - cron: '45 * * * *'
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  BUCKET_NAME: ${{ vars.BUCKET_NAME }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  GCS_PREDS_PREFIX: "structured/preds"
  OUTPUT_DIR: "results"

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auth (WIF) and Setup gcloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Find Latest Run ID Download and Rename File
        id: download_rename
        shell: bash
        run: |
          set -euo pipefail
          LATEST_RUN_DIR=$(gsutil ls -d gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/*/ | tail -1)
          LATEST_RUN_ID=$(echo "$LATEST_RUN_DIR" | sed -E "s|gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/||; s|/||")
          LOCAL_FILENAME="$LATEST_RUN_ID-preds.csv"
          LOCAL_FILENAME_LLM="$LATEST_RUN_ID-preds_llm.csv"
          GCS_SOURCE_FILE="${GCS_PREDS_PREFIX}/$LATEST_RUN_ID/preds.csv"
          LOCAL_TARGET_FILE="${OUTPUT_DIR}/$LOCAL_FILENAME"
          echo "run_id=$LATEST_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "filename=$LOCAL_FILENAME" >> "$GITHUB_OUTPUT"
          echo "filename_llm=$LOCAL_FILENAME_LLM" >> "$GITHUB_OUTPUT"
          echo "Detected latest run ID: $LATEST_RUN_ID"
          mkdir -p ${OUTPUT_DIR}
          gsutil cp gs://${BUCKET_NAME}/${GCS_SOURCE_FILE} ${LOCAL_TARGET_FILE}
          echo "Copied preds.csv"
          if gsutil -q stat gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/$LATEST_RUN_ID/preds_llm.csv; then
            gsutil cp gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/$LATEST_RUN_ID/preds_llm.csv ${OUTPUT_DIR}/$LOCAL_FILENAME_LLM
            echo "Copied preds_llm.csv"
          else
            echo "No preds_llm.csv yet skipping"
          fi

      - name: Commit and Push
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          FILENAME="${{ steps.download_rename.outputs.filename }}"
          FILENAME_LLM="${{ steps.download_rename.outputs.filename_llm }}"
          RUN_ID="${{ steps.download_rename.outputs.run_id }}"
          git add ${OUTPUT_DIR}/$FILENAME
          git add ${OUTPUT_DIR}/$FILENAME_LLM 2>/dev/null || true
          git commit -m "Data Sync: Add hourly prediction file for run $RUN_ID"
          git pull --rebase origin main
          git push
